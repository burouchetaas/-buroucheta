<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Запись на консультацию · Бюроучета.рф</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>/* =============================================================
   Бюроучета.рф — Colors & Type
   Outsourced accounting bureau by Anastasia Sergeeva
   ============================================================= */

/* ---------- FONTS ----------------------------------------------
   Headings:  Halvar Breitschrift  (display, geometric grotesk)
   Body:      Helvetica Neue Cyr   (substituted with system stack
              + Inter as Google-Fonts fallback)
   Signature: Corvetta             (handwritten script)
   --------------------------------------------------------------- */

@font-face {
  font-family: "Halvar Breit";
  src: url("./fonts/HalvarBreit-Rg.ttf") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Halvar Breit";
  src: url("./fonts/HalvarBreit-Md.ttf") format("truetype");
  font-weight: 500 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: "Corvetta";
  src: url("./fonts/Corvetta.ttf") format("truetype");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

/* Helvetica Neue Cyr is licensed; brand-approved system fallback.
   For web/prototype use we cascade through Helvetica → system sans. */

:root {
  /* ---------- COLOR — RAW BRAND TOKENS ----------------------- */
  --olive:        #BAAD52;   /* primary accent */
  --olive-ink:    #8E8235;   /* darker olive (hover, type on cream) */
  --olive-soft:   #E5DFB8;   /* tinted olive (backgrounds, dividers) */
  --olive-wash:   #F4F1DD;   /* very light wash */

  --ink:          #2F2F2F;   /* base — body type, headings */
  --ink-2:        #4A4A4A;   /* secondary text */
  --ink-3:        #7A7A7A;   /* tertiary, captions */
  --ink-4:        #B8B6B0;   /* disabled, hairline */

  --coral:        #E97553;   /* additional accent — alerts, signature CTA */
  --coral-ink:    #C75A3D;   /* coral hover */
  --coral-soft:   #FBE3D9;   /* coral tint */

  --cream:        #FFFDFA;   /* page background — warm off-white */
  --paper:        #FFFFFF;   /* pure white surfaces */
  --line:         #ECEAE3;   /* hairline divider */
  --line-strong:  #D9D6CB;   /* stronger divider */

  /* ---------- SEMANTIC — FOREGROUND -------------------------- */
  --fg-1: var(--ink);        /* primary type */
  --fg-2: var(--ink-2);      /* secondary type */
  --fg-3: var(--ink-3);      /* tertiary, captions, eyebrows */
  --fg-mute: var(--ink-4);
  --fg-accent: var(--olive); /* olive type accents */
  --fg-coral: var(--coral);
  --fg-on-olive: var(--ink); /* type on olive blocks */
  --fg-on-ink: var(--cream); /* type on dark blocks */

  /* ---------- SEMANTIC — BACKGROUND -------------------------- */
  --bg: var(--cream);
  --bg-paper: var(--paper);
  --bg-soft: var(--olive-wash);
  --bg-accent: var(--olive);
  --bg-ink: var(--ink);

  /* ---------- BORDERS / RADII / SHADOWS ---------------------- */
  --border: 1px solid var(--line);
  --border-strong: 1px solid var(--line-strong);
  --border-ink: 1px solid var(--ink);

  --radius-0: 0px;     /* sharp — preferred for premium-editorial blocks */
  --radius-1: 2px;     /* hairline rounding */
  --radius-2: 4px;
  --radius-3: 8px;
  --radius-pill: 999px;

  --shadow-1: 0 1px 2px rgba(47,47,47,0.04), 0 1px 1px rgba(47,47,47,0.03);
  --shadow-2: 0 8px 24px rgba(47,47,47,0.06), 0 2px 6px rgba(47,47,47,0.04);
  --shadow-3: 0 24px 60px rgba(47,47,47,0.10), 0 6px 16px rgba(47,47,47,0.05);

  /* ---------- SPACING SCALE (4-pt base) ---------------------- */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;
  --space-9: 96px;
  --space-10: 128px;

  /* ---------- TYPOGRAPHY — RAW ------------------------------- */
  --font-display: "Halvar Breit", "Halvar Breitschrift", "Helvetica Neue",
                  Helvetica, Arial, sans-serif;
  --font-body: "Helvetica Neue Cyr", "Helvetica Neue", Helvetica, Arial,
                "Segoe UI", system-ui, sans-serif;
  --font-script: "Corvetta", "Brush Script MT", cursive;

  --tracking-tight: -0.02em;
  --tracking-snug: -0.01em;
  --tracking-normal: 0;
  --tracking-wide: 0.04em;
  --tracking-eyebrow: 0.16em;   /* eyebrow / overline */

  --leading-tight: 1.05;
  --leading-snug: 1.2;
  --leading-normal: 1.5;
  --leading-loose: 1.7;
}

/* =============================================================
   SEMANTIC TYPOGRAPHY
   ============================================================= */

html, body {
  font-family: var(--font-body);
  color: var(--fg-1);
  background: var(--bg);
  font-size: 16px;
  line-height: var(--leading-normal);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

.h-display,
.h1,
.h2,
.h3,
.h4 {
  font-family: var(--font-display);
  color: var(--fg-1);
  font-weight: 500;
  letter-spacing: var(--tracking-tight);
  line-height: var(--leading-tight);
  margin: 0;
  text-transform: uppercase;
}

/* Display — hero / cover */
.h-display {
  font-size: clamp(56px, 8vw, 128px);
  font-weight: 700;
  letter-spacing: -0.03em;
}

/* H1 — page title */
.h1 { font-size: clamp(40px, 5vw, 72px); font-weight: 700; }

/* H2 — section title */
.h2 { font-size: clamp(28px, 3vw, 44px); font-weight: 500; }

/* H3 — sub-section */
.h3 {
  font-size: 22px;
  font-weight: 500;
  letter-spacing: var(--tracking-snug);
  text-transform: none;
}

/* H4 — small heading */
.h4 {
  font-size: 16px;
  font-weight: 500;
  letter-spacing: var(--tracking-eyebrow);
  text-transform: uppercase;
}

/* Eyebrow / overline — small caps label */
.eyebrow {
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: var(--tracking-eyebrow);
  text-transform: uppercase;
  color: var(--fg-3);
}

/* Body */
.p, p {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: var(--leading-normal);
  color: var(--fg-1);
  margin: 0 0 1em 0;
  text-wrap: pretty;
}

.p-lead {
  font-size: 20px;
  line-height: 1.45;
  color: var(--fg-1);
}

.p-small {
  font-size: 14px;
  line-height: 1.5;
  color: var(--fg-2);
}

.caption {
  font-size: 12px;
  line-height: 1.4;
  color: var(--fg-3);
  letter-spacing: 0.01em;
}

/* Signature — handwritten flourish */
.signature {
  font-family: var(--font-script);
  font-weight: 400;
  font-size: 32px;
  line-height: 1;
  color: var(--fg-1);
  letter-spacing: 0;
}

/* Inline accents */
.accent-olive { color: var(--fg-accent); }
.accent-coral { color: var(--fg-coral); }
.muted        { color: var(--fg-3); }

a {
  color: var(--fg-1);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-thickness: 1px;
  text-decoration-color: var(--olive);
  transition: color .15s ease, text-decoration-color .15s ease;
}
a:hover {
  color: var(--olive-ink);
  text-decoration-color: var(--olive-ink);
}


* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: var(--cream);
  color: var(--fg-1);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--olive-soft); color: var(--ink); }

/* ============================================================
   GLOBAL
   ============================================================ */
.bu-page { max-width: 1240px; margin: 0 auto; padding: 0 56px; }

.eyebrow {
  font-family: var(--font-display);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--fg-3);
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.eyebrow::before {
  content: "";
  display: block;
  width: 24px;
  height: 1px;
  background: var(--olive);
}
.eyebrow--center { justify-content: center; }
.eyebrow--noline::before { display: none; }

.script {
  font-family: var(--font-script);
  font-weight: 400;
  line-height: 1;
  color: var(--ink);
}

.divider { height: 1px; background: var(--line); width: 100%; }
.divider--olive { background: var(--olive); }

/* ============================================================
   BUTTONS
   ============================================================ */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 10px;
  padding: 16px 24px;
  font-family: var(--font-display);
  font-weight: 500; font-size: 13px;
  letter-spacing: .04em; text-transform: uppercase;
  border: 1px solid transparent;
  border-radius: 4px;
  cursor: pointer;
  transition: background .15s ease, color .15s ease, border-color .15s ease, transform .15s ease;
  white-space: nowrap;
  text-decoration: none;
}
.btn:disabled { opacity: .35; cursor: not-allowed; }
.btn--ink   { background: var(--ink); color: var(--cream); }
.btn--ink:not(:disabled):hover  { background: #1a1a1a; }
.btn--olive { background: var(--olive); color: var(--ink); }
.btn--olive:not(:disabled):hover { background: var(--olive-ink); color: var(--cream); }
.btn--outline { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn--outline:not(:disabled):hover { background: var(--ink); color: var(--cream); }
.btn--ghost { background: transparent; color: var(--ink); padding: 16px 4px; text-transform: none; letter-spacing: 0; font-family: var(--font-body); font-weight: 500; font-size: 15px; }
.btn--ghost:hover { color: var(--olive-ink); }
.btn--lg { padding: 20px 28px; font-size: 14px; }
.btn--block { width: 100%; }

/* ============================================================
   INPUTS
   ============================================================ */
.input {
  width: 100%;
  padding: 14px 16px;
  border: 1px solid var(--line-strong);
  background: var(--paper);
  font-family: var(--font-body); font-size: 15px;
  color: var(--ink);
  border-radius: 4px;
  outline: none;
  min-width: 0;
  transition: border-color .15s ease, box-shadow .15s ease;
}
.input:focus { border-color: var(--olive); box-shadow: inset 0 0 0 1px var(--olive); }
.input::placeholder { color: var(--fg-mute); }
textarea.input { resize: vertical; min-height: 96px; line-height: 1.5; font-family: var(--font-body); }

.field { display: flex; flex-direction: column; gap: 8px; }
.field__label {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 500;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--fg-3);
}
.field__hint {
  font-size: 12px; color: var(--fg-3); margin: 0;
}

.checkbox {
  display: flex; align-items: flex-start; gap: 12px;
  cursor: pointer;
  font-size: 13px; line-height: 1.45; color: var(--fg-2);
}
.checkbox input { display: none; }
.checkbox__box {
  flex: none;
  width: 18px; height: 18px;
  border: 1px solid var(--line-strong);
  background: var(--paper);
  border-radius: 2px;
  margin-top: 2px;
  display: grid; place-items: center;
  transition: background .15s ease, border-color .15s ease;
}
.checkbox input:checked + .checkbox__box {
  background: var(--ink); border-color: var(--ink);
}
.checkbox__box::after {
  content: "";
  width: 9px; height: 5px;
  border-left: 1.5px solid var(--cream);
  border-bottom: 1.5px solid var(--cream);
  transform: rotate(-45deg) translate(0, -1px);
  opacity: 0;
}
.checkbox input:checked + .checkbox__box::after { opacity: 1; }
.checkbox a { color: var(--ink); }

/* ============================================================
   HEADER
   ============================================================ */
.bu-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 56px;
  border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 30;
  background: rgba(255, 253, 250, 0.92);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
}
.bu-header__logo img { height: 40px; display: block; }
.bu-header__nav { display: flex; gap: 32px; }
.bu-header__nav a {
  font-family: var(--font-body); font-size: 14px; color: var(--ink);
  text-decoration: none;
}
.bu-header__nav a:hover { color: var(--olive-ink); }
.bu-header__cta { display: flex; align-items: center; gap: 24px; }
.bu-header__phone {
  font-family: var(--font-display); font-weight: 500; font-size: 13px;
  letter-spacing: .04em; color: var(--ink); text-decoration: none;
}

/* ============================================================
   HERO
   ============================================================ */
.bu-hero {
  position: relative;
  padding: 120px 56px 140px;
  max-width: 1240px;
  margin: 0 auto;
}
.bu-hero--compact { padding: 80px 56px 96px; }
.bu-hero--tall    { padding: 160px 56px 180px; }

.bu-hero__inner {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 80px;
  align-items: end;
}
.bu-hero__title {
  font-family: var(--font-display); font-weight: 700;
  font-size: clamp(56px, 7.4vw, 116px);
  line-height: .92;
  letter-spacing: -.03em;
  text-transform: uppercase;
  margin: 28px 0 0;
  color: var(--ink);
}
.bu-hero__title em {
  font-style: normal;
  color: var(--olive);
}
.bu-hero__lead {
  font-family: var(--font-body);
  font-size: 18px; line-height: 1.5;
  color: var(--fg-2);
  max-width: 44ch;
  margin: 28px 0 0;
}
.bu-hero__actions {
  display: flex; gap: 12px; align-items: center;
  margin-top: 40px;
}
.bu-hero__bullets {
  margin-top: 48px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  border-top: 1px solid var(--line);
  padding-top: 24px;
}
.bu-hero__bullet {
  display: flex; flex-direction: column; gap: 6px;
}
.bu-hero__bullet-n {
  font-family: var(--font-display); font-weight: 700;
  font-size: 28px; letter-spacing: -.02em;
  color: var(--ink);
}
.bu-hero__bullet-l {
  font-size: 13px; line-height: 1.4;
  color: var(--fg-3);
  max-width: 22ch;
}

/* Hero side card — next available slots */
.bu-hero__card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 28px;
  display: flex; flex-direction: column;
  gap: 18px;
}
.bu-hero__card-head {
  display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--line);
  padding-bottom: 14px;
}
.bu-hero__card-title {
  font-family: var(--font-display); font-weight: 500;
  font-size: 14px; letter-spacing: .04em; text-transform: uppercase;
  color: var(--ink);
}
.bu-hero__card-status {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: .14em; text-transform: uppercase; color: var(--fg-3);
}
.bu-hero__card-status::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%;
  background: var(--olive);
  box-shadow: 0 0 0 4px rgba(186,173,82,.15);
}
.bu-hero__card-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  padding: 6px 0;
}
.bu-hero__card-row + .bu-hero__card-row { border-top: 1px solid var(--line); padding-top: 14px; margin-top: 6px; }
.bu-hero__card-name {
  font-size: 14px; color: var(--fg-2);
}
.bu-hero__card-name strong {
  display: block;
  font-family: var(--font-display); font-weight: 500;
  font-size: 16px; color: var(--ink); letter-spacing: -.005em; text-transform: none;
}
.bu-hero__card-slot {
  font-family: var(--font-display); font-weight: 500;
  font-size: 13px; letter-spacing: .04em;
  color: var(--ink);
  background: var(--olive-wash);
  padding: 8px 12px;
  border-radius: 2px;
  white-space: nowrap;
}

/* ============================================================
   SPECIALISTS
   ============================================================ */
.bu-specialists {
  padding: 120px 56px;
  max-width: 1240px;
  margin: 0 auto;
}
.bu-specialists__head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 80px;
  align-items: end;
  margin-bottom: 64px;
}
.bu-specialists__title {
  font-family: var(--font-display); font-weight: 500;
  font-size: clamp(36px, 4vw, 56px); letter-spacing: -.02em;
  text-transform: uppercase; line-height: 1.02;
  color: var(--ink); margin: 16px 0 0;
}
.bu-specialists__title em { font-style: normal; color: var(--olive); }
.bu-specialists__sub {
  font-size: 16px; line-height: 1.55; color: var(--fg-2);
  max-width: 44ch;
  margin: 0;
}

.bu-specialists__grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 32px;
}

.bu-specialist {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 36px;
  display: grid;
  grid-template-columns: 132px 1fr;
  gap: 28px;
  position: relative;
  transition: border-color .2s ease;
}
.bu-specialist:hover { border-color: var(--line-strong); }
.bu-specialist__photo {
  width: 132px; height: 168px;
  background: var(--olive-wash);
  position: relative;
  overflow: hidden;
  border-radius: 2px;
}
.bu-specialist__photo svg { width: 100%; height: 100%; display: block; }
.bu-specialist__role {
  font-family: var(--font-display); font-weight: 500;
  font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--olive-ink);
  margin: 0 0 10px;
}
.bu-specialist__name {
  font-family: var(--font-display); font-weight: 500;
  font-size: 26px; letter-spacing: -.01em;
  color: var(--ink);
  margin: 0;
  line-height: 1.05;
}
.bu-specialist__bio {
  font-size: 14px; line-height: 1.5;
  color: var(--fg-2);
  margin: 14px 0 0;
}
.bu-specialist__creds {
  list-style: none; padding: 0; margin: 12px 0 0;
  display: flex; flex-direction: column; gap: 5px;
}
.bu-specialist__cred {
  display: flex; align-items: flex-start; gap: 7px;
  font-size: 12px; line-height: 1.4; color: var(--olive-ink);
  font-family: var(--font-body);
}
.bu-specialist__cred::before {
  content: "—";
  color: var(--olive);
  flex: none;
  font-family: var(--font-display);
}
.bu-specialist__meta {
  display: flex; flex-direction: column; gap: 6px;
  margin: 20px 0 0;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.bu-specialist__meta-row {
  display: flex; justify-content: space-between; align-items: baseline;
  font-size: 14px;
}
.bu-specialist__meta-l {
  color: var(--fg-3);
  font-family: var(--font-display);
  font-size: 11px; letter-spacing: .14em; text-transform: uppercase;
}
.bu-specialist__meta-v {
  font-family: var(--font-display); font-weight: 500;
  color: var(--ink);
  font-size: 14px;
  letter-spacing: -.005em;
}
.bu-specialist__price {
  margin-top: 20px;
  display: flex; align-items: baseline; gap: 12px;
}
.bu-specialist__price-num {
  font-family: var(--font-display); font-weight: 700;
  font-size: 32px; letter-spacing: -.02em;
  color: var(--ink);
}
.bu-specialist__price-l {
  font-size: 13px; color: var(--fg-3);
}
.bu-specialist__cta { margin-top: 24px; }

/* ============================================================
   PRICING / WHAT'S INCLUDED
   ============================================================ */
.bu-included {
  padding: 0 56px 120px;
  max-width: 1240px;
  margin: 0 auto;
}
.bu-included__inner {
  background: var(--olive-wash);
  padding: 64px;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 80px;
  align-items: start;
}
.bu-included__title {
  font-family: var(--font-display); font-weight: 500;
  font-size: 36px; letter-spacing: -.02em; line-height: 1.05;
  text-transform: uppercase;
  margin: 14px 0 0;
}
.bu-included__lead {
  font-size: 15px; line-height: 1.55; color: var(--fg-2);
  margin: 24px 0 0; max-width: 36ch;
}
.bu-included__list {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column;
}
.bu-included__item {
  padding: 18px 0;
  border-top: 1px solid rgba(47,47,47,.12);
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 16px;
  align-items: start;
}
.bu-included__item:last-child { border-bottom: 1px solid rgba(47,47,47,.12); }
.bu-included__num {
  font-family: var(--font-display); font-weight: 500;
  font-size: 11px; letter-spacing: .14em;
  color: var(--olive-ink); padding-top: 3px;
}
.bu-included__t {
  font-family: var(--font-display); font-weight: 500;
  font-size: 17px; letter-spacing: -.005em;
  color: var(--ink); margin: 0;
}
.bu-included__d {
  font-size: 14px; line-height: 1.45;
  color: var(--fg-2); margin: 4px 0 0;
}

/* ============================================================
   REVIEWS
   ============================================================ */
.bu-reviews {
  padding: 0 56px 120px;
  max-width: 1240px;
  margin: 0 auto;
}
.bu-reviews__head {
  display: flex; justify-content: space-between; align-items: end;
  gap: 40px;
  margin-bottom: 56px;
}
.bu-reviews__title {
  font-family: var(--font-display); font-weight: 500;
  font-size: clamp(32px, 3.5vw, 48px); letter-spacing: -.02em;
  text-transform: uppercase; line-height: 1.02;
  margin: 12px 0 0;
}
.bu-reviews__rating {
  display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
}
.bu-reviews__stars {
  display: flex; gap: 4px;
  color: var(--olive);
}
.bu-reviews__rating-l {
  font-size: 13px; color: var(--fg-3);
}

.bu-reviews__grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}
.bu-review {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 28px;
  display: flex; flex-direction: column;
  gap: 14px;
  position: relative;
}
.bu-review__head {
  display: flex; align-items: center; gap: 12px;
}
.bu-review__monogram {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--olive-wash);
  display: grid; place-items: center;
  font-family: var(--font-display); font-weight: 500;
  font-size: 14px; color: var(--olive-ink);
  letter-spacing: .02em;
}
.bu-review__who {
  display: flex; flex-direction: column; gap: 2px;
}
.bu-review__name {
  font-family: var(--font-display); font-weight: 500;
  font-size: 15px; color: var(--ink); letter-spacing: -.005em;
}
.bu-review__date {
  font-size: 12px; color: var(--fg-3);
}
.bu-review__stars {
  display: flex; gap: 3px;
  color: var(--olive);
  margin-top: 2px;
}
.bu-review__topic {
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--fg-3);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
}
.bu-review__text {
  font-size: 14px; line-height: 1.55;
  color: var(--fg-1);
  margin: 0;
}

/* ============================================================
   FAQ / META BAND
   ============================================================ */
.bu-meta {
  padding: 96px 56px;
  max-width: 1240px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 80px;
  border-top: 1px solid var(--line);
}
.bu-meta__title {
  font-family: var(--font-display); font-weight: 500;
  font-size: 32px; letter-spacing: -.02em;
  text-transform: uppercase; line-height: 1.05;
  margin: 12px 0 0;
}
.bu-meta__list { display: flex; flex-direction: column; }
.bu-meta__item {
  padding: 24px 0;
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 32px;
  align-items: start;
}
.bu-meta__item:last-child { border-bottom: 1px solid var(--line); }
.bu-meta__q {
  font-family: var(--font-display); font-weight: 500;
  font-size: 17px; letter-spacing: -.005em; color: var(--ink);
  margin: 0;
}
.bu-meta__a {
  font-size: 14px; line-height: 1.5; color: var(--fg-2);
  margin: 8px 0 0; max-width: 60ch;
}
.bu-meta__tag {
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--olive-ink);
}

/* ============================================================
   FOOTER
   ============================================================ */
.bu-footer {
  padding: 80px 56px 32px;
  max-width: 1240px;
  margin: 0 auto;
  border-top: 1px solid var(--line);
  display: grid;
  grid-template-columns: 1.4fr 1fr 1fr 1fr;
  gap: 48px;
}
.bu-footer__col {
  font-family: var(--font-body); font-size: 13px; line-height: 1.7;
  color: var(--fg-2);
}
.bu-footer__col a { color: var(--ink); text-decoration: none; }
.bu-footer__col a:hover { color: var(--olive-ink); }
.bu-footer__col .eyebrow { display: block; margin-bottom: 14px; }
.bu-footer__logo { height: 48px; display: block; margin-bottom: 16px; }
.bu-footer__addr { color: var(--fg-3); font-size: 12px; margin: 0; }
.bu-footer__legal {
  grid-column: 1 / -1;
  display: flex; justify-content: space-between;
  padding-top: 32px; margin-top: 32px;
  border-top: 1px solid var(--line);
  font-size: 12px; color: var(--fg-3);
}

/* ============================================================
   MODAL — booking wizard
   ============================================================ */
.bu-modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(47,47,47,.45);
  z-index: 100;
  display: grid; place-items: center;
  padding: 24px;
  animation: fadeIn .2s ease-out;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.bu-modal {
  background: var(--cream);
  width: 100%;
  max-width: 1080px;
  max-height: calc(100vh - 48px);
  overflow: hidden;
  display: grid;
  grid-template-columns: 320px 1fr;
  position: relative;
  animation: slideUp .25s ease-out;
}
@keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.bu-modal__close {
  position: absolute; top: 20px; right: 20px;
  width: 40px; height: 40px;
  border: 1px solid var(--line);
  background: var(--paper);
  cursor: pointer;
  display: grid; place-items: center;
  z-index: 5;
  border-radius: 50%;
  transition: border-color .15s ease, color .15s ease;
}
.bu-modal__close:hover { border-color: var(--ink); }

/* Sidebar with steps */
.bu-modal__side {
  background: var(--ink);
  color: var(--cream);
  padding: 36px 32px;
  display: flex; flex-direction: column;
  gap: 32px;
  min-height: 640px;
}
.bu-modal__side .eyebrow { color: rgba(255,253,250,.55); }
.bu-modal__side .eyebrow::before { background: var(--olive); }
.bu-modal__side-title {
  font-family: var(--font-display); font-weight: 500;
  font-size: 22px; letter-spacing: -.005em;
  text-transform: none;
  margin: 12px 0 0;
  color: var(--cream);
  line-height: 1.2;
}
.bu-modal__steps {
  list-style: none; padding: 0; margin: 0;
  display: flex; flex-direction: column; gap: 4px;
  flex: 1;
}
.bu-modal__step {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 14px;
  padding: 14px 0;
  border-top: 1px solid rgba(255,253,250,.12);
  align-items: center;
}
.bu-modal__step:last-child { border-bottom: 1px solid rgba(255,253,250,.12); }
.bu-modal__step-n {
  font-family: var(--font-display); font-weight: 500;
  font-size: 12px; letter-spacing: .12em;
  color: rgba(255,253,250,.4);
}
.bu-modal__step-l {
  font-family: var(--font-display); font-weight: 500;
  font-size: 14px; letter-spacing: -.005em;
  color: rgba(255,253,250,.55);
  transition: color .15s ease;
}
.bu-modal__step--active .bu-modal__step-l { color: var(--cream); }
.bu-modal__step--active .bu-modal__step-n { color: var(--olive); }
.bu-modal__step--done   .bu-modal__step-n { color: var(--olive); }
.bu-modal__step--done   .bu-modal__step-l { color: rgba(255,253,250,.85); }

.bu-modal__side-foot {
  font-size: 12px; line-height: 1.55;
  color: rgba(255,253,250,.5);
}
.bu-modal__side-foot a { color: var(--cream); text-decoration: underline; text-decoration-color: var(--olive); }

/* Body */
.bu-modal__body {
  padding: 36px 40px;
  overflow-y: auto;
  display: flex; flex-direction: column;
}
.bu-modal__h {
  font-family: var(--font-display); font-weight: 500;
  font-size: 26px; letter-spacing: -.01em;
  text-transform: uppercase; color: var(--ink);
  margin: 8px 0 0; line-height: 1.05;
}
.bu-modal__sub {
  font-size: 14px; line-height: 1.55; color: var(--fg-2);
  margin: 12px 0 0; max-width: 56ch;
}
.bu-modal__section { margin-top: 28px; }
.bu-modal__nav {
  margin-top: auto;
  padding-top: 28px;
  display: flex; justify-content: space-between; align-items: center; gap: 16px;
}

/* Specialist pick (in modal) */
.bu-pickrow {
  display: grid;
  grid-template-columns: 56px 1fr auto auto;
  gap: 20px;
  align-items: center;
  padding: 18px 20px;
  border: 1px solid var(--line);
  background: var(--paper);
  cursor: pointer;
  transition: border-color .15s ease, background .15s ease;
  text-align: left;
  font-family: inherit;
  width: 100%;
}
.bu-pickrow + .bu-pickrow { margin-top: 12px; }
.bu-pickrow:hover { border-color: var(--ink); }
.bu-pickrow--active {
  border-color: var(--ink);
  background: var(--paper);
  box-shadow: inset 0 0 0 1px var(--ink);
}
.bu-pickrow__photo {
  width: 56px; height: 56px;
  border-radius: 50%;
  object-fit: cover;
  object-position: top;
  flex: none;
}
.bu-pickrow__name {
  font-family: var(--font-display); font-weight: 500;
  font-size: 17px; color: var(--ink); letter-spacing: -.005em;
  line-height: 1.2;
}
.bu-pickrow__role {
  font-size: 13px; color: var(--fg-3); margin-top: 4px;
}
.bu-pickrow__price {
  font-family: var(--font-display); font-weight: 500;
  font-size: 15px; color: var(--ink); letter-spacing: -.005em;
  text-align: right;
}
.bu-pickrow__price-l {
  font-size: 12px; color: var(--fg-3); margin-top: 2px;
}
.bu-pickrow__radio {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1px solid var(--line-strong);
  display: grid; place-items: center;
  flex: none;
}
.bu-pickrow--active .bu-pickrow__radio { border-color: var(--ink); }
.bu-pickrow--active .bu-pickrow__radio::after {
  content: ""; width: 10px; height: 10px;
  border-radius: 50%; background: var(--ink);
}

/* Calendar */
.bu-cal {
  display: grid;
  grid-template-columns: 1.1fr 1fr;
  gap: 32px;
}
.bu-cal__month {
  display: flex; flex-direction: column; gap: 14px;
}
.bu-cal__head {
  display: flex; justify-content: space-between; align-items: center;
}
.bu-cal__month-l {
  font-family: var(--font-display); font-weight: 500;
  font-size: 17px; letter-spacing: -.005em; color: var(--ink);
  text-transform: capitalize;
}
.bu-cal__nav {
  display: flex; gap: 6px;
}
.bu-cal__nav button {
  width: 36px; height: 36px;
  border: 1px solid var(--line);
  background: var(--paper);
  display: grid; place-items: center;
  cursor: pointer;
  transition: border-color .15s ease, background .15s ease, color .15s ease;
  border-radius: 4px;
  color: var(--ink);
}
.bu-cal__nav button:hover { border-color: var(--ink); }
.bu-cal__nav button:disabled { color: var(--fg-mute); cursor: not-allowed; opacity: .5; }
.bu-cal__nav button:disabled:hover { border-color: var(--line); }

.bu-cal__weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--fg-3);
  padding: 6px 0;
}
.bu-cal__weekdays > div { text-align: center; }
.bu-cal__grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}
.bu-cal__day {
  aspect-ratio: 1 / 1;
  background: var(--paper);
  border: 1px solid var(--line);
  font-family: var(--font-display); font-weight: 500;
  font-size: 14px; color: var(--ink);
  display: grid; place-items: center;
  cursor: pointer;
  position: relative;
  transition: border-color .15s ease, background .15s ease, color .15s ease;
  border-radius: 2px;
}
.bu-cal__day:hover:not(:disabled):not(.bu-cal__day--off) {
  border-color: var(--ink);
}
.bu-cal__day--off,
.bu-cal__day:disabled {
  color: var(--fg-mute);
  background: transparent;
  border-color: transparent;
  cursor: not-allowed;
}
.bu-cal__day--past {
  color: var(--fg-mute);
  background: transparent;
  border-color: transparent;
  cursor: not-allowed;
  text-decoration: line-through;
  text-decoration-color: var(--line-strong);
}
.bu-cal__day--empty { background: transparent; border-color: transparent; pointer-events: none; }
.bu-cal__day--today {
  border-color: var(--olive);
}
.bu-cal__day--today::after {
  content: "";
  position: absolute; bottom: 4px; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--olive);
}
.bu-cal__day--active {
  background: var(--ink);
  color: var(--cream);
  border-color: var(--ink);
}
.bu-cal__day--active::after { background: var(--cream); }

/* Slots */
.bu-slots {
  display: flex; flex-direction: column; gap: 14px;
  min-width: 0;
}
.bu-slots__head {
  display: flex; flex-direction: column; gap: 4px;
}
.bu-slots__title {
  font-family: var(--font-display); font-weight: 500;
  font-size: 17px; letter-spacing: -.005em; color: var(--ink);
}
.bu-slots__sub {
  font-size: 12px; color: var(--fg-3);
  font-family: var(--font-display); letter-spacing: .12em; text-transform: uppercase;
}
.bu-slots__list {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.bu-slot {
  padding: 12px 0;
  border: 1px solid var(--line);
  background: var(--paper);
  font-family: var(--font-display); font-weight: 500;
  font-size: 14px; color: var(--ink); letter-spacing: -.005em;
  cursor: pointer;
  transition: border-color .15s ease, background .15s ease, color .15s ease;
  border-radius: 2px;
  text-align: center;
}
.bu-slot:hover { border-color: var(--ink); }
.bu-slot--taken {
  color: var(--fg-mute);
  text-decoration: line-through;
  text-decoration-color: var(--line-strong);
  cursor: not-allowed;
  background: transparent;
}
.bu-slot--taken:hover { border-color: var(--line); }
.bu-slot--active {
  background: var(--ink);
  color: var(--cream);
  border-color: var(--ink);
}
.bu-slots__empty {
  padding: 24px;
  text-align: center;
  font-size: 13px; color: var(--fg-3);
  border: 1px dashed var(--line-strong);
  border-radius: 2px;
}

/* Summary line in modal */
.bu-summary {
  background: var(--olive-wash);
  padding: 20px 24px;
  display: flex; gap: 32px; align-items: center;
  flex-wrap: wrap;
}
.bu-summary__item {
  display: flex; flex-direction: column; gap: 4px;
}
.bu-summary__l {
  font-family: var(--font-display); font-size: 10px;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--olive-ink);
}
.bu-summary__v {
  font-family: var(--font-display); font-weight: 500;
  font-size: 15px; letter-spacing: -.005em; color: var(--ink);
}

/* Contact step */
.bu-contact {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 20px;
}
.bu-contact .field--full { grid-column: 1 / -1; }

/* Confirmation */
.bu-confirm {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: start;
}
.bu-confirm__check {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--olive);
  display: grid; place-items: center;
  color: var(--ink);
}
.bu-confirm__h {
  font-family: var(--font-display); font-weight: 700;
  font-size: 36px; letter-spacing: -.02em;
  text-transform: uppercase; line-height: 1;
  color: var(--ink);
  margin: 24px 0 0;
}
.bu-confirm__lead {
  font-size: 15px; line-height: 1.55; color: var(--fg-2);
  margin: 16px 0 0; max-width: 40ch;
}
.bu-confirm__sig {
  margin-top: 32px;
  padding-top: 20px;
  border-top: 1px solid var(--olive);
  display: flex; align-items: baseline; gap: 16px;
  max-width: 360px;
}
.bu-confirm__sig .script { font-size: 32px; }
.bu-confirm__sig-l {
  font-family: var(--font-display); font-size: 10px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--fg-3);
}

.bu-receipt {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 28px 28px 24px;
}
.bu-receipt__head {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 8px;
}
.bu-receipt__id {
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--fg-3);
}
.bu-receipt__row {
  display: grid;
  grid-template-columns: 110px 1fr;
  gap: 16px;
  padding: 12px 0;
  border-bottom: 1px solid var(--line);
}
.bu-receipt__row:last-child { border-bottom: 0; }
.bu-receipt__l {
  font-family: var(--font-display); font-size: 10px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--fg-3);
  align-self: center;
}
.bu-receipt__v {
  font-family: var(--font-display); font-weight: 500;
  font-size: 14px; letter-spacing: -.005em;
  color: var(--ink);
  text-align: right;
}
.bu-receipt__v--soft {
  font-family: var(--font-body); font-weight: 400;
  font-size: 13px; color: var(--fg-2);
  line-height: 1.45;
  text-align: right;
}
.bu-receipt__actions {
  margin-top: 20px;
  display: flex; flex-direction: column; gap: 10px;
}

/* ============================================================
   Booking inline (single-page flow)
   ============================================================ */
.bu-booking {
  padding: 0 56px 120px;
  max-width: 1240px;
  margin: 0 auto;
}
.bu-booking__inner {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 56px;
  display: grid;
  grid-template-columns: 1fr 1.2fr;
  gap: 56px;
  align-items: start;
}
.bu-booking__h {
  font-family: var(--font-display); font-weight: 500;
  font-size: 36px; letter-spacing: -.02em;
  text-transform: uppercase; line-height: 1.05;
  color: var(--ink); margin: 12px 0 0;
}
.bu-booking__lead {
  font-size: 15px; line-height: 1.55; color: var(--fg-2);
  margin: 20px 0 0; max-width: 36ch;
}
.bu-booking__steps {
  margin-top: 32px;
  display: flex; flex-direction: column; gap: 6px;
}
.bu-booking__step {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 14px;
  padding: 12px 0;
  border-top: 1px solid var(--line);
  font-size: 14px; color: var(--fg-2);
}
.bu-booking__step:last-child { border-bottom: 1px solid var(--line); }
.bu-booking__step-n {
  font-family: var(--font-display); font-size: 11px;
  letter-spacing: .14em; color: var(--olive-ink);
}

.bu-booking__form {
  display: flex; flex-direction: column; gap: 28px;
}

/* ============================================================
   Tweaks panel customization
   ============================================================ */
.tw-panel { font-family: var(--font-body); }

/* ============================================================
   Responsive — Tablet 980px
   ============================================================ */
@media (max-width: 980px) {
  .bu-page, .bu-hero, .bu-specialists, .bu-included,
  .bu-reviews, .bu-meta, .bu-footer, .bu-booking {
    padding-left: 28px; padding-right: 28px;
  }
  .bu-hero__inner, .bu-specialists__head, .bu-specialists__grid,
  .bu-included__inner, .bu-reviews__grid, .bu-meta, .bu-cal,
  .bu-confirm, .bu-contact, .bu-booking__inner {
    grid-template-columns: 1fr;
  }
  .bu-modal { grid-template-columns: 1fr; }
  .bu-modal__side { display: none; }
  .bu-hero__bullets { grid-template-columns: repeat(3, 1fr); }
  .bu-footer { grid-template-columns: 1fr 1fr 1fr; }
  .bu-footer__col:first-child { grid-column: 1 / -1; }
}

/* ============================================================
   Responsive — Mobile 640px
   ============================================================ */
@media (max-width: 640px) {

  /* ── Global ────────────────────────────────────────────── */
  .bu-page, .bu-hero, .bu-specialists, .bu-included,
  .bu-reviews, .bu-meta, .bu-footer, .bu-booking {
    padding-left: 16px; padding-right: 16px;
  }

  /* ── Header ────────────────────────────────────────────── */
  .bu-header { padding: 14px 16px; }
  .bu-header__nav { display: none; }
  .bu-header__phone { display: none; }

  /* ── Hero ──────────────────────────────────────────────── */
  .bu-hero         { padding-top: 48px;  padding-bottom: 56px; }
  .bu-hero--compact { padding-top: 32px; padding-bottom: 40px; }
  .bu-hero--tall   { padding-top: 64px;  padding-bottom: 72px; }

  .bu-hero__actions {
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
  }
  .bu-hero__actions .btn--ghost { text-align: center; }

  .bu-hero__bullets {
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 28px;
  }
  .bu-hero__bullet-n { font-size: 22px; }

  /* Hero card: show below text, full width */
  .bu-hero__card { margin-top: 32px; }

  /* ── Specialists ───────────────────────────────────────── */
  .bu-specialists { padding-top: 56px; padding-bottom: 56px; }
  .bu-specialists__head { gap: 16px; margin-bottom: 32px; }

  .bu-specialist {
    grid-template-columns: 80px 1fr;
    gap: 16px;
    padding: 20px;
  }
  .bu-specialist__photo { width: 80px; height: 104px; }
  .bu-specialist__name  { font-size: 20px; }
  .bu-specialist__price { flex-direction: column; gap: 2px; }
  .bu-specialist__price-num { font-size: 26px; white-space: nowrap; }

  /* ── Included ──────────────────────────────────────────── */
  .bu-included { padding-bottom: 56px; }

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  </script>

/* deterministic pseudo-busy slots so the calendar feels real */
function isSlotBusy(specialistId, dateStr, hour) {
  // simple hash
  const s = specialistId + dateStr + hour;
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (h * 31 + s.charCodeAt(i)) | 0;
  return Math.abs(h) % 7 < 2; // ~28% busy
}

function generateSlots(specialist, dateStr) {
  const { start, end } = specialist.workHours;
  const slots = [];
  for (let h = start; h < end; h++) {
    slots.push({
      hour: h,
      label: `${String(h).padStart(2, "0")}:00`,
      busy: isSlotBusy(specialist.id, dateStr, h),
    });
  }
  return slots;
}

function fmtPrice(n) {
  return n.toLocaleString("ru-RU").replace(/,/g, " ") + " ₽";
}

function pad2(n) { return String(n).padStart(2, "0"); }

function fmtDate(date) {
  const months = [
    "января","февраля","марта","апреля","мая","июня",
    "июля","августа","сентября","октября","ноября","декабря",
  ];
  const days = ["воскресенье","понедельник","вторник","среда","четверг","пятница","суббота"];
  return {
    iso: `${date.getFullYear()}-${pad2(date.getMonth()+1)}-${pad2(date.getDate())}`,
    long: `${date.getDate()} ${months[date.getMonth()]}`,
    longFull: `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`,
    weekday: days[date.getDay()],
    month: ["январь","февраль","март","апрель","май","июнь","июль","август","сентябрь","октябрь","ноябрь","декабрь"][date.getMonth()],
  };
}

function isWeekend(d) { const n = d.getDay(); return n === 0 || n === 6; }

function buildGoogleCalUrl({ specialist, date, hour, name, comment, contact }) {
  // dates in UTC for the URL (Google parses YYYYMMDDTHHMMSSZ — Moscow MSK is UTC+3)
  const start = new Date(Date.UTC(
    date.getFullYear(), date.getMonth(), date.getDate(),
    hour - 3, 0, 0
  ));
  const end = new Date(start.getTime() + 60 * 60 * 1000);
  const fmt = (dt) =>
    dt.getUTCFullYear() +
    pad2(dt.getUTCMonth()+1) +
    pad2(dt.getUTCDate()) + "T" +
    pad2(dt.getUTCHours()) +
    pad2(dt.getUTCMinutes()) + "00Z";
  const title = encodeURIComponent(`Консультация · ${specialist.name}`);
  const details = encodeURIComponent(
    `Бюроучета.рф — онлайн-консультация (ВКС)\n\n` +
    `Клиент: ${name || "—"}\n` +
    `Контакт: ${contact || "—"}\n` +
    `Специалист: ${specialist.name}\n\n` +
    `Комментарий клиента:\n${comment || "—"}`
  );
  const location = encodeURIComponent("Ссылка придёт в Telegram за пару часов до встречи");
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${fmt(start)}/${fmt(end)}&details=${details}&location=${location}`;
}

/* Portrait — real photos */
function Portrait({ who, size = 132, height }) {
  const h = height || size;
  const src = who === "anastasia" ? "./assets/anastasia.JPG" : "./assets/olga.JPG";
  return (
    <img
      src={src}
      alt={who === "anastasia" ? "Анастасия Сергеева" : "Ольга Смагина"}
      style={{ width: size, height: h, objectFit: "cover", objectPosition: "top", display: "block" }}
    />
  );
}

/* small avatar circle */
function MiniAvatar({ who, size = 56 }) {
  const src = who === "anastasia" ? "./assets/anastasia.JPG" : "./assets/olga.JPG";
  return (
    <img
      src={src}
      alt={who === "anastasia" ? "Анастасия Сергеева" : "Ольга Смагина"}
      className="bu-pickrow__photo"
      style={{ width: size, height: size, objectFit: "cover", objectPosition: "top", borderRadius: "50%" }}
    />
  );
}

/* Star icon (filled) */
function Star({ size = 14 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 2.5l2.95 6.45 7.05.78-5.25 4.9 1.5 6.97L12 18.4l-6.25 3.2 1.5-6.97L2 9.73l7.05-.78L12 2.5z"/>
    </svg>
  );
}

Object.assign(window, { SPECIALISTS, generateSlots, fmtPrice, fmtDate, pad2, isWeekend, buildGoogleCalUrl, Portrait, MiniAvatar, Star, isSlotBusy });

function Hero({ onBook, size = "default" }) {
  const cls = size === "compact" ? "bu-hero bu-hero--compact"
            : size === "tall"    ? "bu-hero bu-hero--tall"
            : "bu-hero";
  return (
    <section className={cls}>
      <div className="bu-hero__inner">
        <div>
          <span className="eyebrow">Запись на консультацию · онлайн</span>
          <h1 className="bu-hero__title">
            Разберёмся<br/>
            в&nbsp;ваших<br/>
            <em>цифрах</em> за&nbsp;час.
          </h1>
          <p className="bu-hero__lead">
            Один час с&nbsp;аттестованным экспертом — и&nbsp;вы точно знаете,
            что делать с&nbsp;налогами, учётом и&nbsp;ФНС.
            Конкретные шаги, без&nbsp;воды.
          </p>
          <div className="bu-hero__actions">
            <button className="btn btn--ink btn--lg" onClick={onBook}>
              Записаться на консультацию
            </button>
            <a className="btn btn--ghost btn--lg" href="#specialists">
              Выбрать специалиста&nbsp;→
            </a>
          </div>
          <div className="bu-hero__bullets">
            <div className="bu-hero__bullet">
              <div className="bu-hero__bullet-n">60&nbsp;мин</div>
              <div className="bu-hero__bullet-l">Достаточно, чтобы разобрать одну сложную ситуацию полностью</div>
            </div>
            <div className="bu-hero__bullet">
              <div className="bu-hero__bullet-n">2&nbsp;шага</div>
              <div className="bu-hero__bullet-l">Выбрать специалиста и время — встреча в&nbsp;календаре</div>
            </div>
            <div className="bu-hero__bullet">
              <div className="bu-hero__bullet-n">17&nbsp;лет</div>
              <div className="bu-hero__bullet-l">Средний опыт наших специалистов в&nbsp;бухгалтерии и&nbsp;налогах</div>
            </div>
          </div>
        </div>

        <aside className="bu-hero__card">
          <div className="bu-hero__card-head">
            <span className="bu-hero__card-title">Ближайшие окна</span>
            <span className="bu-hero__card-status">Когда?</span>
          </div>
          {SPECIALISTS.map((s) => (
            <div className="bu-hero__card-row" key={s.id}>
              <div className="bu-hero__card-name">
                <strong>{s.name}</strong>
                {s.role.split(" · ").slice(-1)[0]}
              </div>
              <div className="bu-hero__card-slot">{s.nextSlot}</div>
            </div>
          ))}
          <button className="btn btn--olive btn--block" onClick={onBook}>
            Выбрать своё время
          </button>
        </aside>
      </div>
    </section>
  );
}

function Specialists({ onBook }) {
  return (
    <section className="bu-specialists" id="specialists">
      <div className="bu-specialists__head">
        <div>
          <span className="eyebrow">Кто проведёт консультацию</span>
          <h2 className="bu-specialists__title">Два <em>специалиста</em>, разные задачи.</h2>
        </div>
        <p className="bu-specialists__sub">
          Анастасия — для собственников и&nbsp;комплексных вопросов. 
          Ольга&nbsp;— для&nbsp;ИП,
          маркетплейсов и&nbsp;текущей бухгалтерской рутины. Выбирайте по&nbsp;ситуации.
        </p>
      </div>

      <div className="bu-specialists__grid">
        {SPECIALISTS.map((s) => (
          <article className="bu-specialist" key={s.id}>
            <div className="bu-specialist__photo">
              <Portrait who={s.portrait} size={132} height={168} />
            </div>
            <div>
              <p className="bu-specialist__role">{s.role}</p>
              <h3 className="bu-specialist__name">{s.name}</h3>
              <p className="bu-specialist__bio">{s.bio}</p>
              {s.credentials && (
                <ul className="bu-specialist__creds">
                  {s.credentials.map((cred, i) => (
                    <li key={i} className="bu-specialist__cred">{cred}</li>
                  ))}
                </ul>
              )}
              <div className="bu-specialist__meta">
                <div className="bu-specialist__meta-row">
                  <span className="bu-specialist__meta-l">Опыт</span>
                  <span className="bu-specialist__meta-v">{s.expYears} лет</span>
                </div>
                <div className="bu-specialist__meta-row">
                  <span className="bu-specialist__meta-l">Часы</span>
                  <span className="bu-specialist__meta-v">
                    {pad2(s.workHours.start)}:00–{pad2(s.workHours.end)}:00 · будни
                  </span>
                </div>
                <div className="bu-specialist__meta-row">
                  <span className="bu-specialist__meta-l">Ближайшее окно</span>
                  <span className="bu-specialist__meta-v">{s.nextSlot}</span>
                </div>
              </div>
              <div className="bu-specialist__price">
                <span className="bu-specialist__price-num">{fmtPrice(s.pricePerHour)}</span>
                <span className="bu-specialist__price-l">за час · минимум 1 час</span>
              </div>
              <button
                className="btn btn--outline bu-specialist__cta"
                onClick={() => onBook(s.id)}
              >
                Выбрать {s.name.split(" ")[0]}
              </button>
            </div>
          </article>
        ))}
      </div>
    </section>
  );
}

function Included() {
  const items = [
    { t: "Разбор вашей ситуации", d: "Перед встречей читаем ваш комментарий и готовим конкретные ответы." },
    { t: "Час созвона по ВКС", d: "Камера — по желанию. Запись разговора пришлём, если попросите." },
    { t: "Документы под рукой", d: "Можем разобрать договоры, выписки, требования ФНС прямо на встрече." },
    { t: "План действий письмом", d: "Тезисы, ссылки на нормы и список шагов — в течение суток после встречи." },
  ];
  return (
    <section className="bu-included" id="included">
      <div className="bu-included__inner">
        <div>
          <span className="eyebrow">Что входит в час</span>
          <h2 className="bu-included__title">Один разговор — четыре результата.</h2>
          <p className="bu-included__lead">
            Стоимость зависит только от&nbsp;специалиста. Формат, длительность
            и&nbsp;состав работы одинаковые: мы&nbsp;не&nbsp;продаём пакеты
            и&nbsp;не&nbsp;считаем минуты.
          </p>
        </div>
        <ol className="bu-included__list">
          {items.map((it, i) => (
            <li className="bu-included__item" key={i}>
              <span className="bu-included__num">0{i+1}</span>
              <div>
                <h4 className="bu-included__t">{it.t}</h4>
                <p className="bu-included__d">{it.d}</p>
              </div>
            </li>
          ))}
        </ol>
      </div>
    </section>
  );

  <script type="text/babel">
/* @jsxRuntime classic */

const { useState, useMemo, useEffect } = React;

function BookingModal({ open, onClose, initialSpecialistId, mode = "modal" }) {
  const [step, setStep] = useState(0); // 0 specialist, 1 date+time, 2 contact, 3 confirm
  const [specialistId, setSpecialistId] = useState(initialSpecialistId || SPECIALISTS[0].id);
  const today = useMemo(() => { const d = new Date(); d.setHours(0,0,0,0); return d; }, []);
  const [viewMonth, setViewMonth] = useState(() => new Date(today.getFullYear(), today.getMonth(), 1));
  const [date, setDate] = useState(null);
  const [hour, setHour] = useState(null);
  const [form, setForm] = useState({ name: "", phone: "", tg: "", comment: "", consent: false });

  useEffect(() => {
    if (open && initialSpecialistId) {
      setSpecialistId(initialSpecialistId);
      setStep(1);
    }
  }, [open, initialSpecialistId]);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", onKey);
    document.body.style.overflow = "hidden";
    return () => { window.removeEventListener("keydown", onKey); document.body.style.overflow = ""; };
  }, [open, onClose]);

  if (!open) return null;

  const specialist = SPECIALISTS.find((s) => s.id === specialistId);
  const dateMeta = date ? fmtDate(date) : null;
  const slots = (date && specialist) ? generateSlots(specialist, dateMeta.iso) : [];

  const canNext =
    (step === 0 && !!specialist) ||
    (step === 1 && !!date && hour != null) ||
    (step === 2 && form.name.trim() && (form.phone.trim() || form.tg.trim()) && form.consent);

  const labels = ["Специалист", "Дата и время", "Ваши контакты", "Подтверждение"];

  return (
    <div className="bu-modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="bu-modal" role="dialog" aria-modal="true">
        <button className="bu-modal__close" onClick={onClose} aria-label="Закрыть">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 2l10 10M12 2L2 12"/></svg>
        </button>

        <aside className="bu-modal__side">
          <div>
            <span className="eyebrow">Запись на консультацию</span>
            <h3 className="bu-modal__side-title">Час с&nbsp;экспертом — встреча в&nbsp;вашем календаре.</h3>
          </div>
          <ol className="bu-modal__steps">
            {labels.map((l, i) => (
              <li key={i} className={
                "bu-modal__step " +
                (i === step ? "bu-modal__step--active " : "") +
                (i < step ? "bu-modal__step--done" : "")
              }>
                <span className="bu-modal__step-n">0{i+1}</span>
                <span className="bu-modal__step-l">{l}</span>
              </li>
            ))}
          </ol>
          <div className="bu-modal__side-foot">
            После записи мы автоматически создадим событие в&nbsp;вашем Google&nbsp;Календаре. Перенести можно одной кнопкой&nbsp;— до&nbsp;начала встречи.
          </div>
        </aside>

        <div className="bu-modal__body">
          {step === 0 && (
            <BookingStepSpecialist
              specialistId={specialistId}
              onPick={setSpecialistId}
            />
          )}
          {step === 1 && (
            <BookingStepWhen
              specialist={specialist}
              today={today}
              viewMonth={viewMonth}
              setViewMonth={setViewMonth}
              date={date} setDate={setDate}
              hour={hour} setHour={setHour}
              slots={slots}
              dateMeta={dateMeta}
            />
          )}
          {step === 2 && (
            <BookingStepContact
              specialist={specialist}
              date={date} hour={hour}
              form={form} setForm={setForm}
            />
          )}
          {step === 3 && (
            <BookingConfirm
              specialist={specialist} date={date} hour={hour} form={form}
              onClose={onClose}
            />
          )}

          {step < 3 && (
            <div className="bu-modal__nav">
              <button
                className="btn btn--ghost"
                onClick={() => step === 0 ? onClose() : setStep(step - 1)}
              >
                {step === 0 ? "Отмена" : "← Назад"}
              </button>
              <button
                className="btn btn--ink btn--lg"
                disabled={!canNext}
                onClick={() => setStep(step + 1)}
              >
                {step === 2 ? "Записаться" : "Далее"}
              </button>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ---------- STEP 0: Specialist ---------- */
function BookingStepSpecialist({ specialistId, onPick }) {
  return (
    <>
      <span className="eyebrow">Шаг 01 · Специалист</span>
      <h2 className="bu-modal__h">Кто проведёт встречу?</h2>
      <p className="bu-modal__sub">Цена и&nbsp;доступные часы зависят от&nbsp;специалиста. Можно поменять выбор на&nbsp;любом шаге.</p>
      <div className="bu-modal__section">
        {SPECIALISTS.map((s) => (
          <button
            key={s.id}
            className={"bu-pickrow " + (s.id === specialistId ? "bu-pickrow--active" : "")}
            onClick={() => onPick(s.id)}
          >
            <MiniAvatar who={s.portrait} size={56}/>
            <div>
              <div className="bu-pickrow__name">{s.name}</div>
              <div className="bu-pickrow__role">{s.role}</div>
            </div>
            <div>
              <div className="bu-pickrow__price">{fmtPrice(s.pricePerHour)}</div>
              <div className="bu-pickrow__price-l">за час · {pad2(s.workHours.start)}:00–{pad2(s.workHours.end)}:00</div>
            </div>
            <div className="bu-pickrow__radio"/>
          </button>
        ))}
      </div>
    </>
  );
}

/* ---------- STEP 1: Date & Time ---------- */
function BookingStepWhen({ specialist, today, viewMonth, setViewMonth, date, setDate, hour, setHour, slots, dateMeta }) {
  // build calendar grid for viewMonth
  const year = viewMonth.getFullYear();
  const month = viewMonth.getMonth();
  const firstDay = new Date(year, month, 1);
  const startWeekday = (firstDay.getDay() + 6) % 7; // make Mon=0
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(new Date(year, month, d));

  const monthLabel = `${fmtDate(firstDay).month} ${year}`;
  const canPrev = (year > today.getFullYear()) || (year === today.getFullYear() && month > today.getMonth());

  const goPrev = () => { if (canPrev) setViewMonth(new Date(year, month - 1, 1)); };
  const goNext = () => setViewMonth(new Date(year, month + 1, 1));

  return (
    <>
      <span className="eyebrow">Шаг 02 · Дата и время</span>
      <h2 className="bu-modal__h">Когда вам удобно?</h2>
      <p className="bu-modal__sub">
        Часы&nbsp;{specialist.name.split(" ")[0]} —{" "}
        {pad2(specialist.workHours.start)}:00–{pad2(specialist.workHours.end)}:00,
        будни. Серым&nbsp;— уже занятые окна.
      </p>

      <div className="bu-modal__section bu-cal">
        <div className="bu-cal__month">
          <div className="bu-cal__head">
            <div className="bu-cal__month-l">{monthLabel}</div>
            <div className="bu-cal__nav">
              <button onClick={goPrev} disabled={!canPrev} aria-label="Предыдущий месяц">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M9 2L4 7l5 5"/></svg>
              </button>
              <button onClick={goNext} aria-label="Следующий месяц">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M5 2l5 5-5 5"/></svg>
              </button>
            </div>
          </div>
          <div className="bu-cal__weekdays">
            <div>Пн</div><div>Вт</div><div>Ср</div><div>Чт</div><div>Пт</div><div>Сб</div><div>Вс</div>
          </div>
          <div className="bu-cal__grid">
            {cells.map((d, i) => {
              if (!d) return <div key={i} className="bu-cal__day bu-cal__day--empty"/>;
              const past = d < today;
              const off = isWeekend(d);
              const isToday = d.getTime() === today.getTime();
              const isActive = date && d.getTime() === date.getTime();
              const cls = "bu-cal__day"
                + (past ? " bu-cal__day--past" : "")
                + (off && !past ? " bu-cal__day--off" : "")
                + (isToday ? " bu-cal__day--today" : "")
                + (isActive ? " bu-cal__day--active" : "");
              return (
                <button
                  key={i}
                  className={cls}
                  disabled={past || off}
                  onClick={() => { setDate(d); setHour(null); }}
                >{d.getDate()}</button>
              );
            })}
          </div>
        </div>

        <div className="bu-slots">
          <div className="bu-slots__head">
            <div className="bu-slots__title">
              {date ? `${dateMeta.long}, ${dateMeta.weekday}` : "Выберите дату"}
            </div>
            <div className="bu-slots__sub">
              {date ? `Время · MSK · 60 минут` : "Слева в календаре"}
            </div>
          </div>
          {date ? (
            slots.length ? (
              <div className="bu-slots__list">
                {slots.map((s) => (
                  <button
                    key={s.hour}
                    className={
                      "bu-slot "
                      + (s.busy ? "bu-slot--taken " : "")
                      + (hour === s.hour ? "bu-slot--active" : "")
                    }
                    disabled={s.busy}
                    onClick={() => setHour(s.hour)}
                  >{s.label}</button>
                ))}
              </div>
            ) : (
              <div className="bu-slots__empty">В&nbsp;этот день специалист не&nbsp;принимает.</div>
            )
          ) : (
            <div className="bu-slots__empty">Выберите будний день в&nbsp;календаре слева.</div>
          )}
        </div>
      </div>
    </>
  );
}

/* ---------- STEP 2: Contact ---------- */
function BookingStepContact({ specialist, date, hour, form, setForm }) {

  return (
