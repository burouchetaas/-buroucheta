      <span className="eyebrow">Шаг 03 · Контакты</span>
      <h2 className="bu-modal__h">Куда прислать ссылку?</h2>
      <p className="bu-modal__sub">Заполните одно из&nbsp;контактных полей — телефон или&nbsp;Telegram. Ссылку на&nbsp;ВКС пришлём за&nbsp;пару часов до&nbsp;встречи.</p>

      <div className="bu-summary" style={{marginTop: 24}}>
        <div className="bu-summary__item">
          <span className="bu-summary__l">Специалист</span>
          <span className="bu-summary__v">{specialist.name.split(" ")[0]} {specialist.name.split(" ")[1][0]}.</span>
        </div>
        <div className="bu-summary__item">
          <span className="bu-summary__l">Дата</span>
          <span className="bu-summary__v">{dm.long}, {dm.weekday}</span>
        </div>
        <div className="bu-summary__item">
          <span className="bu-summary__l">Время</span>
          <span className="bu-summary__v">{pad2(hour)}:00–{pad2(hour+1)}:00 MSK</span>
        </div>
        <div className="bu-summary__item">
          <span className="bu-summary__l">К оплате</span>
          <span className="bu-summary__v">{fmtPrice(specialist.pricePerHour)}</span>
        </div>
      </div>

      <div className="bu-modal__section bu-contact">
        <div className="field">
          <label className="field__label">Имя</label>
          <input className="input" placeholder="Как к вам обращаться" value={form.name} onChange={update("name")}/>
        </div>
        <div className="field">
          <label className="field__label">Телефон</label>
          <input className="input" type="tel" placeholder="+7 ___ ___-__-__" value={form.phone} onChange={update("phone")}/>
        </div>
        <div className="field">
          <label className="field__label">Telegram</label>
          <input className="input" placeholder="@username" value={form.tg} onChange={update("tg")}/>
        </div>
        <div className="field" style={{justifyContent:"end"}}>
          <p className="field__hint" style={{marginTop: 28}}>Достаточно одного канала — телефона или&nbsp;Telegram.</p>
        </div>
        <div className="field field--full">
          <label className="field__label">Опишите ситуацию</label>
          <textarea className="input" rows="4" placeholder="Чтобы специалист подготовился: режим, обороты, что именно беспокоит." value={form.comment} onChange={update("comment")}/>
          <p className="field__hint">Чем конкретнее — тем полезнее час. Можно тезисами.</p>
        </div>
        <div className="field field--full">
          <label className="checkbox">
            <input type="checkbox" checked={form.consent} onChange={(e) => setForm((f) => ({...f, consent: e.target.checked}))}/>
            <span className="checkbox__box"/>
            <span>Согласен на обработку персональных данных в&nbsp;соответствии с&nbsp;<a href="#">политикой</a>. Данные используем только для&nbsp;связи и&nbsp;записи на&nbsp;встречу.</span>
          </label>
        </div>
      </div>
    </>
  );
}

/* ---------- STEP 3: Confirmation ---------- */
function BookingConfirm({ specialist, date, hour, form, onClose }) {
  const dm = fmtDate(date);
  const eventId = useMemo(
    () => "bu-" + Math.random().toString(36).slice(2, 8).toUpperCase() + "-" + (specialist.id === "anastasia" ? "AS" : "OS"),
    [specialist]
  );
  const calUrl = useMemo(
    () => buildGoogleCalUrl({ specialist, date, hour, name: form.name, contact: form.phone || form.tg, comment: form.comment }),
    [specialist, date, hour, form]
  );
  return (
    <>
      <div style={{display:"flex", alignItems:"center", gap: 16}}>
        <div className="bu-confirm__check" aria-hidden="true">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 11l5 5 9-11"/></svg>
        </div>
        <span className="eyebrow eyebrow--noline">Запись подтверждена</span>
      </div>

      <div className="bu-confirm" style={{marginTop: 8}}>
        <div>
          <h2 className="bu-confirm__h">Готово,<br/>встреча в&nbsp;календаре.</h2>
          <p className="bu-confirm__lead">
            Событие создано: <strong>{dm.long}, {pad2(hour)}:00 MSK</strong>.
            За&nbsp;час до&nbsp;встречи пришлём ссылку на&nbsp;ВКС
            и&nbsp;короткое напоминание в&nbsp;Telegram.
          </p>
          <div className="bu-confirm__sig">
            <span className="script">Анастасии Сергеевой</span>
            <span className="bu-confirm__sig-l">Бюроучета.рф · до встречи</span>
          </div>
        </div>

        <div className="bu-receipt">
          <div className="bu-receipt__head">
            <span className="bu-receipt__id">№ {eventId}</span>
            <span className="bu-receipt__id" style={{color: "var(--olive-ink)"}}>В календаре</span>
          </div>
          <div className="bu-receipt__row">
            <span className="bu-receipt__l">Специалист</span>
            <span className="bu-receipt__v">{specialist.name}</span>
          </div>
          <div className="bu-receipt__row">
            <span className="bu-receipt__l">Дата</span>
            <span className="bu-receipt__v">{dm.longFull}, {dm.weekday}</span>
          </div>
          <div className="bu-receipt__row">
            <span className="bu-receipt__l">Время</span>
            <span className="bu-receipt__v">{pad2(hour)}:00–{pad2(hour+1)}:00 · MSK</span>
          </div>
          <div className="bu-receipt__row">
            <span className="bu-receipt__l">Формат</span>
            <span className="bu-receipt__v">ВКС · 60 минут</span>
          </div>
          <div className="bu-receipt__row">
            <span className="bu-receipt__l">Стоимость</span>
            <span className="bu-receipt__v">{fmtPrice(specialist.pricePerHour)}</span>
          </div>
          <div className="bu-receipt__row">
            <span className="bu-receipt__l">Клиент</span>
            <span className="bu-receipt__v">{form.name || "—"}</span>
          </div>
          <div className="bu-receipt__row">
            <span className="bu-receipt__l">Контакт</span>
            <span className="bu-receipt__v">{form.phone || form.tg || "—"}</span>
          </div>
          {form.comment && (
            <div className="bu-receipt__row">
              <span className="bu-receipt__l">Комментарий</span>
              <span className="bu-receipt__v--soft">{form.comment}</span>
            </div>
          )}

          <div className="bu-receipt__actions">
            <a className="btn btn--olive btn--block" href={calUrl} target="_blank" rel="noopener">
              Добавить в Google Календарь
            </a>
            <a className="btn btn--outline btn--block" href="#" onClick={(e) => e.preventDefault()}>
              Связаться со специалистом · @buroucheta
            </a>
          </div>
        </div>
      </div>

      <div className="bu-modal__nav">
        <button className="btn btn--ghost" onClick={onClose}>Закрыть</button>
        <span style={{fontSize:12, color:"var(--fg-3)", fontFamily:"var(--font-display)", letterSpacing:".14em", textTransform:"uppercase"}}>
          За пару часов напомним · ссылку пришлём
        </span>
      </div>
    </>
  );
}

Object.assign(window, { BookingModal, BookingStepWhen, BookingStepContact, BookingStepSpecialist, BookingConfirm });

  </script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "flow": "modal",
      "heroSize": "default"
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [open, setOpen] = React.useState(false);
      const [initialSpec, setInitialSpec] = React.useState(null);

      const openModal = (specId) => {
        setInitialSpec(specId || null);
        setOpen(true);
      };

      const onBook = (specId) => {
        if (tweaks.flow === "inline") {
          const target = document.getElementById("inline-booking");
          if (target) target.scrollIntoView({behavior:"smooth", block:"start"});
          if (specId) {
            window.dispatchEvent(new CustomEvent("inline-pick", { detail: specId }));
          }
        } else {
          openModal(specId);
        }
      };

      return (
        <>
          <Header onBook={() => onBook(null)} />
          <main>
            <Hero onBook={() => onBook(null)} size={tweaks.heroSize} />
            <Specialists onBook={onBook} />
            <Included />
            {tweaks.flow === "inline" && <InlineBooking />}
            <Reviews />
            <MetaBand />
          </main>
          <Footer />

          <BookingModal
            open={open}
            onClose={() => setOpen(false)}
            initialSpecialistId={initialSpec}
          />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Поток записи">
              <TweakRadio
                label="Сценарий"
                value={tweaks.flow}
                onChange={(v) => setTweak("flow", v)}
                options={[
                  {value:"modal",  label:"Модальный мастер"},
                  {value:"inline", label:"Одна страница"},
                ]}
              />
            </TweakSection>
            <TweakSection title="Первый экран">
              <TweakRadio
                label="Размер"
                value={tweaks.heroSize}
                onChange={(v) => setTweak("heroSize", v)}
                options={[
                  {value:"compact", label:"Компактный"},
                  {value:"default", label:"Обычный"},
                  {value:"tall",    label:"Большой"},
                ]}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    function InlineBooking() {
      const [specialistId, setSpecialistId] = React.useState(SPECIALISTS[0].id);
      const today = React.useMemo(() => { const d = new Date(); d.setHours(0,0,0,0); return d; }, []);
      const [viewMonth, setViewMonth] = React.useState(() => new Date(today.getFullYear(), today.getMonth(), 1));
      const [date, setDate] = React.useState(null);
      const [hour, setHour] = React.useState(null);
      const [form, setForm] = React.useState({ name:"", phone:"", tg:"", comment:"", consent:false });
      const [confirmed, setConfirmed] = React.useState(false);

      React.useEffect(() => {
        const handler = (e) => setSpecialistId(e.detail);
        window.addEventListener("inline-pick", handler);
        return () => window.removeEventListener("inline-pick", handler);
      }, []);

      const specialist = SPECIALISTS.find((s) => s.id === specialistId);
      const dateMeta = date ? fmtDate(date) : null;
      const slots = (date && specialist) ? generateSlots(specialist, dateMeta.iso) : [];
      const valid = !!date && hour != null && form.name.trim() && (form.phone.trim() || form.tg.trim()) && form.consent;
      const submit = () => { if (!valid) return; setConfirmed(true); };

      if (confirmed) {
        return (
          <section className="bu-booking" id="inline-booking">
            <div className="bu-booking__inner" style={{gridTemplateColumns:"1fr"}}>
              <BookingConfirm specialist={specialist} date={date} hour={hour} form={form} onClose={() => setConfirmed(false)}/>
            </div>
          </section>
        );
      }

      return (
        <section className="bu-booking" id="inline-booking">
          <div className="bu-booking__inner">
            <div>
              <span className="eyebrow">Запись · одна страница</span>
              <h2 className="bu-booking__h">Выберите время<br/>в&nbsp;три шага.</h2>
              <p className="bu-booking__lead">Никаких лишних экранов. Специалист, дата, контакт — рядом, на&nbsp;одном листе.</p>
              <div className="bu-booking__steps">
                <div className="bu-booking__step"><span className="bu-booking__step-n">01</span><span>Выберите специалиста</span></div>
                <div className="bu-booking__step"><span className="bu-booking__step-n">02</span><span>Выберите дату и&nbsp;время</span></div>
                <div className="bu-booking__step"><span className="bu-booking__step-n">03</span><span>Контакты и&nbsp;комментарий</span></div>
                <div className="bu-booking__step"><span className="bu-booking__step-n">04</span><span>Получите событие в&nbsp;календаре</span></div>
              </div>
            </div>

            <div className="bu-booking__form">
              <div>
                <label className="field__label" style={{display:"block", marginBottom:12}}>01 · Специалист</label>
                {SPECIALISTS.map((s) => (
                  <button key={s.id} className={"bu-pickrow " + (s.id === specialistId ? "bu-pickrow--active" : "")} onClick={() => setSpecialistId(s.id)}>
                    <MiniAvatar who={s.portrait} size={48}/>
                    <div>
                      <div className="bu-pickrow__name">{s.name}</div>
                      <div className="bu-pickrow__role">{s.role}</div>
                    </div>
                    <div>
                      <div className="bu-pickrow__price">{fmtPrice(s.pricePerHour)}</div>
                      <div className="bu-pickrow__price-l">за час</div>
                    </div>
                    <div className="bu-pickrow__radio"/>
                  </button>
                ))}
              </div>

              <div>
                <label className="field__label" style={{display:"block", marginBottom:12}}>02 · Дата и время</label>
                <BookingStepWhen specialist={specialist} today={today} viewMonth={viewMonth} setViewMonth={setViewMonth} date={date} setDate={setDate} hour={hour} setHour={setHour} slots={slots} dateMeta={dateMeta}/>
              </div>

              <div>
                <label className="field__label" style={{display:"block", marginBottom:12}}>03 · Контакты</label>
                <div className="bu-contact">
                  <div className="field">
                    <label className="field__label">Имя</label>
                    <input className="input" placeholder="Как к вам обращаться" value={form.name} onChange={(e)=>setForm({...form, name:e.target.value})}/>
                  </div>
                  <div className="field">
                    <label className="field__label">Телефон</label>
                    <input className="input" type="tel" placeholder="+7 ___ ___-__-__" value={form.phone} onChange={(e)=>setForm({...form, phone:e.target.value})}/>
                  </div>
                  <div className="field">
                    <label className="field__label">Telegram</label>
                    <input className="input" placeholder="@username" value={form.tg} onChange={(e)=>setForm({...form, tg:e.target.value})}/>
                  </div>
                  <div className="field" style={{justifyContent:"end"}}>
                    <p className="field__hint" style={{marginTop: 28}}>Достаточно одного канала.</p>
                  </div>
                  <div className="field field--full">
                    <label className="field__label">Опишите ситуацию</label>
                    <textarea className="input" rows="3" placeholder="Чтобы специалист подготовился: режим, обороты, что беспокоит." value={form.comment} onChange={(e)=>setForm({...form, comment:e.target.value})}/>
                  </div>
                  <div className="field field--full">
                    <label className="checkbox">
                      <input type="checkbox" checked={form.consent} onChange={(e)=>setForm({...form, consent:e.target.checked})}/>
                      <span className="checkbox__box"/>
                      <span>Согласен на&nbsp;обработку персональных данных. Используем их&nbsp;только для&nbsp;записи.</span>
                    </label>
                  </div>
                </div>
              </div>

              <button className="btn btn--ink btn--lg btn--block" disabled={!valid} onClick={submit}>
                Записаться · {date ? fmtDate(date).long : "выберите дату"}{hour!=null ? `, ${pad2(hour)}:00` : ""} · {fmtPrice(specialist.pricePerHour)}
              </button>
            </div>
          </div>
        </section>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
